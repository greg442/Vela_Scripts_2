<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELA — Executive Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --off-white: #f8f7f5;
    --stone: #f0ede8;
    --border: #e5e1da;
    --text-primary: #1a1814;
    --text-secondary: #6b6560;
    --text-tertiary: #a09890;
    --now: #c0392b;
    --soon: #d4860a;
    --normal: #2d6a4f;
    --rising: #2d6a4f;
    --steady: #5a7a8a;
    --stalling: #d4860a;
    --blocked: #c0392b;
    --sv-transformational: #c9a84c;
    --sv-high: #2d6a4f;
    --sv-moderate: #5a7a8a;
    --sv-low: #a09890;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text-primary); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: baseline; gap: 16px; }
  .vela-wordmark { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.08em; }
  .vela-tagline { font-size: 11px; font-weight: 300; color: var(--text-tertiary); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 24px; }
  .date-display { font-size: 12px; color: var(--text-secondary); font-weight: 300; }
  .refresh-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: var(--stone); color: var(--text-primary); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rising); animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  main { max-width: 1600px; margin: 0 auto; padding: 32px 40px 40px; }
  .briefing-date { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); font-family: 'DM Mono', monospace; margin-bottom: 28px; }
  .error-banner { background: #fdf0ef; border: 1px solid #f5c6c2; color: var(--now); padding: 12px 24px; font-size: 12px; border-radius: 2px; margin-bottom: 20px; display: none; }

  /* TOP ROW — Priority Stack (left) + Deal Intelligence (right) */
  .top-row { display: grid; grid-template-columns: 380px 1fr; gap: 20px; margin-bottom: 20px; align-items: start; }

  /* BOTTOM ROW — Relationship Radar + Signal Feed */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  .panel { background: var(--white); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .panel-header { padding: 18px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; justify-content: space-between; }
  .panel-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 400; }
  .panel-count { font-size: 11px; color: var(--text-tertiary); font-family: 'DM Mono', monospace; }

  /* BADGES */
  .badge { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .badge-now     { background: #fdf0ef; color: var(--now);     border: 1px solid #f5c6c2; }
  .badge-soon    { background: #fdf6e7; color: var(--soon);    border: 1px solid #f5dfa0; }
  .badge-normal  { background: #edf5f0; color: var(--normal);  border: 1px solid #b7d9c4; }
  .badge-rising  { background: #edf5f0; color: var(--rising);  border: 1px solid #b7d9c4; }
  .badge-steady  { background: #eef2f5; color: var(--steady);  border: 1px solid #c0d2da; }
  .badge-stalling{ background: #fdf6e7; color: var(--stalling);border: 1px solid #f5dfa0; }
  .badge-blocked { background: #fdf0ef; color: var(--blocked); border: 1px solid #f5c6c2; }

  /* STAGE BADGES */
  .stage-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 2px; font-family: 'DM Mono', monospace; white-space: nowrap; letter-spacing: 0.06em; max-width: 160px; overflow: hidden; text-overflow: ellipsis; display: inline-block; }
  .stage-discovery       { background: #eef2f5; color: var(--steady);   border: 1px solid #c0d2da; }
  .stage-active          { background: #edf5f0; color: var(--normal);   border: 1px solid #b7d9c4; }
  .stage-due-diligence   { background: #fdf6e7; color: var(--soon);     border: 1px solid #f5dfa0; }
  .stage-negotiation     { background: #fdf0ef; color: var(--now);      border: 1px solid #f5c6c2; }
  .stage-closing         { background: #1a1814; color: #ffffff;         border: 1px solid #1a1814; }
  .stage-waiting         { background: #f8f7f5; color: var(--text-tertiary); border: 1px solid var(--border); }

  /* PRIORITY STACK */
  .priority-item { display: grid; grid-template-columns: 28px 1fr auto; align-items: start; padding: 14px 24px; border-bottom: 1px solid var(--border); gap: 12px; transition: background 0.15s; }
  .priority-item:last-child { border-bottom: none; }
  .priority-item:hover { background: var(--off-white); }
  .priority-rank { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-tertiary); padding-top: 2px; }
  .priority-objective { font-size: 13px; font-weight: 500; margin-bottom: 3px; line-height: 1.4; }
  .priority-next { font-size: 11px; color: var(--text-secondary); font-weight: 300; }
  .priority-next::before { content: '-> '; color: var(--text-tertiary); }
  .priority-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; padding-top: 2px; }

  /* DEAL INTELLIGENCE TABLE */
  .deal-table { width: 100%; border-collapse: collapse; }
  .deal-table thead tr { border-bottom: 2px solid var(--border); }
  .deal-table th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .deal-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: default; }
  .deal-table tbody tr:last-child { border-bottom: none; }
  .deal-table tbody tr:hover { background: var(--off-white); }
  .deal-table td { padding: 11px 14px; font-size: 13px; vertical-align: middle; }

  /* SV color bar */
  .sv-bar { width: 4px; border-radius: 2px; height: 32px; flex-shrink: 0; }
  .sv-transformational { background: var(--sv-transformational); }
  .sv-high     { background: var(--sv-high); }
  .sv-moderate { background: var(--sv-moderate); }
  .sv-low      { background: var(--sv-low); }

  .deal-name-cell { display: flex; align-items: center; gap: 10px; }
  .deal-name { font-weight: 500; font-size: 13px; }
  .deal-type-label { font-size: 10px; color: var(--text-tertiary); font-weight: 300; }

  .next-action-cell { font-size: 12px; color: var(--text-secondary); max-width: 260px; }
  .owner-cell { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

  .days-cell { text-align: right; }
  .days-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 400; line-height: 1; }
  .days-num.stale-hot  { color: var(--now); }
  .days-num.stale-warn { color: var(--soon); }
  .days-num.stale-ok   { color: var(--normal); }
  .days-label { font-size: 9px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; }

  /* RELATIONSHIP RADAR */
  .rel-item { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border); gap: 16px; transition: background 0.15s; }
  .rel-item:last-child { border-bottom: none; }
  .rel-item:hover { background: var(--off-white); }
  .rel-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .rel-context { font-size: 11px; color: var(--text-secondary); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .rel-days { font-family: 'DM Mono', monospace; font-size: 18px; line-height: 1; margin-bottom: 2px; text-align: right; }
  .rel-days.drift-high { color: var(--now); }
  .rel-days.drift-mid  { color: var(--soon); }
  .rel-days.drift-low  { color: var(--normal); }
  .rel-days-label { font-size: 9px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; }

  /* SIGNAL FEED */
  .signal-item { display: grid; grid-template-columns: auto 1fr auto; align-items: start; padding: 12px 24px; border-bottom: 1px solid var(--border); gap: 12px; transition: background 0.15s; }
  .signal-item:last-child { border-bottom: none; }
  .signal-item:hover { background: var(--off-white); }
  .signal-ium { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 400; line-height: 1; padding-top: 1px; min-width: 22px; text-align: center; }
  .signal-summary { font-size: 12px; font-weight: 400; margin-bottom: 3px; line-height: 1.4; }
  .signal-action { font-size: 11px; color: var(--text-secondary); font-weight: 300; }
  .signal-action::before { content: '-> '; color: var(--text-tertiary); }
  .signal-type { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; text-align: right; }
  .signal-type.opportunity { color: var(--normal); }
  .signal-type.risk        { color: var(--now); }
  .signal-type.momentum    { color: var(--steady); }
  .signal-type.pattern     { color: var(--soon); }
  .signal-type.noise       { color: var(--text-tertiary); }
  .signal-ts { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; font-family: 'DM Mono', monospace; text-align: right; }

  /* DECISIONS */
  .decisions-strip { background: var(--white); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .decisions-header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .decisions-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 500; font-family: 'DM Mono', monospace; }
  .decisions-list { display: flex; overflow-x: auto; }
  .decision-item { padding: 14px 24px; border-right: 1px solid var(--border); min-width: 260px; flex-shrink: 0; transition: background 0.15s; }
  .decision-item:hover { background: var(--off-white); }
  .decision-item:last-child { border-right: none; }
  .decision-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .decision-meta { font-size: 11px; color: var(--text-tertiary); font-family: 'DM Mono', monospace; }

  .empty-state { padding: 28px 24px; text-align: center; color: var(--text-tertiary); font-size: 13px; font-weight: 300; font-style: italic; }
  .loading { padding: 24px; text-align: center; color: var(--text-tertiary); font-size: 12px; font-family: 'DM Mono', monospace; }

  @media (max-width: 1100px) {
    .top-row { grid-template-columns: 1fr; }
    .bottom-row { grid-template-columns: 1fr; }
    main { padding: 20px; }
    header { padding: 0 20px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <span class="vela-wordmark">VELA</span>
    <span class="vela-tagline">Executive Intelligence</span>
  </div>
  <div class="header-right">
    <span class="date-display" id="dateDisplay"></span>
    <div class="status-dot" title="Live"></div>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>
</header>
<main>
  <div class="briefing-date" id="briefingDate"></div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="top-row">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Priority Stack</span><span class="panel-count" id="priorityCount"></span></div>
      <div id="priorityPanel"><div class="loading">Loading...</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Deal Intelligence</span><span class="panel-count" id="dealCount"></span></div>
      <div id="dealPanel"><div class="loading">Loading...</div></div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Relationship Radar</span><span class="panel-count" id="relCount"></span></div>
      <div id="relPanel"><div class="loading">Loading...</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Signal Feed</span><span class="panel-count" id="signalCount"></span></div>
      <div id="signalPanel"><div class="loading">Loading...</div></div>
    </div>
  </div>
  <div class="decisions-strip">
    <div class="decisions-header"><span class="decisions-title">Open Decisions</span><span class="panel-count" id="decisionCount"></span></div>
    <div class="decisions-list" id="decisionsPanel"><div class="loading">Loading...</div></div>
  </div>
</main>
<script>
const BASE = '';
function setDate() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('briefingDate').textContent = 'Morning Briefing — ' + now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
async function query(sql) {
  const url = `${BASE}/hannah.json?sql=${encodeURIComponent(sql)}&_shape=objects`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`API error ${r.status}`);
  const data = await r.json();
  return data.rows || [];
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function urgencyBadge(u) {
  const v = (u || 'normal').toLowerCase();
  return `<span class="badge badge-${v}">${v}</span>`;
}
function momentumBadge(m) {
  const v = (m || 'steady').toLowerCase();
  return `<span class="badge badge-${v}">${v}</span>`;
}
function stageBadge(s) {
  if (!s) return '';
  const v = s.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z-]/g,'');
  const label = s.length > 18 ? s.slice(0,18) + '…' : s;
  const cls = v.includes('negotiation') ? 'stage-negotiation'
    : v.includes('closing') ? 'stage-closing'
    : v.includes('due') ? 'stage-due-diligence'
    : v.includes('active') ? 'stage-active'
    : v.includes('waiting') ? 'stage-waiting'
    : 'stage-discovery';
  return `<span class="stage-badge ${cls}">${esc(label)}</span>`;
}
function svBar(sv) {
  if (!sv) return '<div class="sv-bar sv-moderate"></div>';
  const v = sv.toLowerCase();
  const cls = v.includes('transform') ? 'sv-transformational'
    : v.includes('high') || v.includes('critical') ? 'sv-high'
    : v.includes('moderate') ? 'sv-moderate'
    : 'sv-low';
  return `<div class="sv-bar ${cls}" title="${esc(sv)}"></div>`;
}
function stalenessClass(d) {
  if (d >= 14) return 'stale-hot';
  if (d >= 7)  return 'stale-warn';
  return 'stale-ok';
}
function driftClass(d) {
  if (d >= 21) return 'drift-high';
  if (d >= 10) return 'drift-mid';
  return 'drift-low';
}
function fmtDate(ts) { return ts ? ts.slice(0,10) : ''; }

async function loadPriorities() {
  const rows = await query(`SELECT p.rank, p.urgency, p.momentum, p.objective, p.next_action, e.name AS entity FROM priorities p LEFT JOIN entities e ON p.entity_id = e.id ORDER BY p.rank ASC LIMIT 8`);
  const el = document.getElementById('priorityPanel');
  document.getElementById('priorityCount').textContent = rows.length ? rows.length + ' items' : '';
  if (!rows.length) { el.innerHTML = '<div class="empty-state">No priorities on record</div>'; return; }
  el.innerHTML = rows.map(r => `
    <div class="priority-item">
      <div class="priority-rank">${r.rank || '—'}</div>
      <div>
        <div class="priority-objective">${esc(r.objective)}</div>
        ${r.next_action ? `<div class="priority-next">${esc(r.next_action)}</div>` : ''}
      </div>
      <div class="priority-badges">${urgencyBadge(r.urgency)}${momentumBadge(r.momentum)}</div>
    </div>`).join('');
}

async function loadDeals() {
  const rows = await query(`
    SELECT
      name, status, stage, next_action, strategic_val, owner, deal_type,
      CAST((julianday('now') - julianday(last_updated)) AS INTEGER) AS days_stale
    FROM entities
    WHERE type = 'deal'
    ORDER BY
      CASE WHEN status = 'active' THEN 0 ELSE 1 END ASC,
      CASE
        WHEN stage = 'Negotiation' THEN 0
        WHEN stage = 'Closing' THEN 1
        WHEN stage = 'Due Diligence' THEN 2
        WHEN stage = 'Active Conversation' THEN 3
        WHEN stage = 'Discovery' THEN 4
        ELSE 5
      END ASC,
      days_stale DESC`);
  const el = document.getElementById('dealPanel');
  document.getElementById('dealCount').textContent = rows.length ? rows.length + ' deals' : '';
  if (!rows.length) { el.innerHTML = '<div class="empty-state">No deals on record</div>'; return; }
  el.innerHTML = `
    <table class="deal-table">
      <thead>
        <tr>
          <th style="width:4px;padding:10px 0 10px 14px;"></th>
          <th>Deal</th>
          <th>Stage</th>
          <th>Next Action</th>
          <th>Owner</th>
          <th style="text-align:right">Days</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const d = r.days_stale || 0;
          return `
          <tr>
            <td style="padding:11px 6px 11px 14px;width:4px">${svBar(r.strategic_val)}</td>
            <td>
              <div class="deal-name-cell">
                <div>
                  <div class="deal-name">${esc(r.name)}</div>
                  ${r.deal_type ? `<div class="deal-type-label">${esc(r.deal_type)}</div>` : ''}
                </div>
              </div>
            </td>
            <td>${stageBadge(r.stage || r.status)}</td>
            <td><div class="next-action-cell">${esc(r.next_action || '—')}</div></td>
            <td><div class="owner-cell">${esc(r.owner || '—')}</div></td>
            <td class="days-cell">
              <div class="days-num ${stalenessClass(d)}">${d}</div>
              <div class="days-label">days</div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function loadRelationships() {
  const rows = await query(`
    SELECT e.name, e.status, e.context, e.tags, e.last_updated,
      CAST((julianday('now') - julianday(e.last_updated)) AS INTEGER) AS days_stale,
      COUNT(s.id) AS signals_30d
    FROM entities e
    LEFT JOIN signals s ON s.entity_id = e.id AND s.ts >= datetime('now', '-30 days')
    WHERE e.type = 'person'
    GROUP BY e.id
    ORDER BY days_stale DESC LIMIT 8`);
  const el = document.getElementById('relPanel');
  document.getElementById('relCount').textContent = rows.length ? rows.length + ' contacts' : '';
  if (!rows.length) { el.innerHTML = '<div class="empty-state">No relationships on record</div>'; return; }
  el.innerHTML = rows.map(r => {
    const d = r.days_stale || 0;
    return `
    <div class="rel-item">
      <div>
        <div class="rel-name">${esc(r.name)}</div>
        <div class="rel-context">${esc(r.context || r.tags || r.status || '')}</div>
      </div>
      <div>
        <div class="rel-days ${driftClass(d)}">${d}</div>
        <div class="rel-days-label">days</div>
      </div>
    </div>`;
  }).join('');
}

async function loadSignals() {
  const rows = await query(`
    SELECT s.ts, s.signal_type, s.ium_score, s.source, s.summary, s.action_taken, e.name AS entity
    FROM signals s
    LEFT JOIN entities e ON s.entity_id = e.id
    ORDER BY s.ts DESC LIMIT 10`);
  const el = document.getElementById('signalPanel');
  document.getElementById('signalCount').textContent = rows.length ? rows.length + ' recent' : '';
  if (!rows.length) { el.innerHTML = '<div class="empty-state">No signals logged yet</div>'; return; }
  el.innerHTML = rows.map(r => {
    const st = (r.signal_type || 'noise').toLowerCase();
    return `
    <div class="signal-item">
      <div class="signal-ium">${r.ium_score || '—'}</div>
      <div>
        <div class="signal-summary">${esc(r.summary)}${r.entity ? ` <span style="color:var(--text-tertiary)">[${esc(r.entity)}]</span>` : ''}</div>
        ${r.action_taken ? `<div class="signal-action">${esc(r.action_taken)}</div>` : ''}
      </div>
      <div>
        <div class="signal-type ${st}">${st}</div>
        <div class="signal-ts">${fmtDate(r.ts)}</div>
      </div>
    </div>`;
  }).join('');
}

async function loadDecisions() {
  const rows = await query(`SELECT id, ts, title, context, revisit_date FROM decisions WHERE status = 'active' ORDER BY ts DESC LIMIT 8`);
  const el = document.getElementById('decisionsPanel');
  document.getElementById('decisionCount').textContent = rows.length ? rows.length + ' pending' : '';
  if (!rows.length) { el.innerHTML = '<div class="empty-state" style="padding:16px 24px;text-align:left">No open decisions</div>'; return; }
  el.innerHTML = rows.map(r => `
    <div class="decision-item">
      <div class="decision-title">${esc(r.title)}</div>
      <div class="decision-meta">${fmtDate(r.ts)}${r.revisit_date ? ' · revisit ' + r.revisit_date : ''}</div>
    </div>`).join('');
}

async function loadAll() {
  setDate();
  const banner = document.getElementById('errorBanner');
  try {
    await Promise.all([loadPriorities(), loadDeals(), loadRelationships(), loadSignals(), loadDecisions()]);
    banner.style.display = 'none';
  } catch(e) {
    banner.textContent = 'Could not reach Datasette API. ' + e.message;
    banner.style.display = 'block';
  }
}
loadAll();
setInterval(loadAll, 60000);
setInterval(setDate, 30000);
</script>
</body>
</html>
